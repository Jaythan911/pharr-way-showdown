<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharr Way Jeopardy — City of Pharr</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#0f1d44;
  --blue2:#002a5a;
  --blue3:#1c3968;
  --gold:#f2c127;
  --gold2:#f9be29;
  --white:#ffffff;
  --offwhite:#e8f0ff;
  --muted:#7080c0;
  --correct:#00dd66;
  --wrong:#ff2244;
  --shadow:0 4px 24px rgba(0,0,80,0.7);
}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--blue);color:var(--white);overflow:hidden;}

/* ── SCREENS ── */
.screen{display:none;position:fixed;inset:0;z-index:10;overflow-y:auto;}
.screen.active{display:flex;flex-direction:column;align-items:center;}

/* ══════════ INTRO ══════════ */
#screen-intro{
  justify-content:center;
  background:radial-gradient(ellipse at 50% 30%,#1a10e0,#0300a0 60%,#010050);
  padding:1.5rem;gap:1.5rem;
}
.intro-logo{text-align:center;}
.intro-logo .eyebrow{font-size:.8rem;letter-spacing:.3em;color:var(--muted);margin-bottom:.3rem;}
.intro-logo h1{
  font-family:'Anton',sans-serif;
  font-size:clamp(4rem,13vw,8rem);
  letter-spacing:.05em;
  color:var(--gold);
  text-shadow:0 0 40px rgba(245,197,24,.5),4px 4px 0 rgba(0,0,80,.8);
  line-height:.95;
}
.intro-logo h2{
  font-family:'Anton',sans-serif;
  font-size:clamp(1rem,2.5vw,1.5rem);
  letter-spacing:.25em;
  color:var(--offwhite);
  margin-top:.4rem;
  text-shadow:0 0 15px rgba(255,255,255,.3);
}
.setup-box{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.15);
  border-radius:16px;
  padding:1.8rem;
  width:100%;max-width:520px;
  backdrop-filter:blur(8px);
}
.setup-box h3{
  font-family:'Anton',sans-serif;
  font-size:1.4rem;letter-spacing:.1em;
  color:var(--gold);margin-bottom:1.2rem;
}
.teams-grid{display:flex;flex-direction:column;gap:.55rem;margin-bottom:.9rem;}
.team-row{display:flex;align-items:center;gap:.5rem;}
.t-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.t-input{
  flex:1;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);
  border-radius:8px;padding:.55rem .8rem;
  color:var(--white);font-family:'Barlow',sans-serif;font-size:1rem;font-weight:600;
  letter-spacing:.04em;outline:none;transition:border-color .2s;
}
.t-input:focus{border-color:var(--gold);}
.t-remove{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1.1rem;padding:.2rem .4rem;transition:color .2s;line-height:1;}
.t-remove:hover{color:var(--wrong);}
.btn-addteam{
  width:100%;background:none;border:1px dashed rgba(255,255,255,.2);border-radius:8px;
  padding:.55rem 1rem;color:var(--muted);font-family:'Barlow',sans-serif;
  font-size:.95rem;font-weight:600;letter-spacing:.05em;cursor:pointer;
  transition:all .2s;margin-bottom:1.4rem;
}
.btn-addteam:hover:not(:disabled){border-color:var(--gold);color:var(--gold);}
.btn-addteam:disabled{opacity:.3;cursor:not-allowed;}
.btn-play{
  width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none;border-radius:12px;padding:1rem;
  color:#1a0800;font-family:'Anton',sans-serif;font-size:2rem;letter-spacing:.15em;
  cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(245,197,24,.4);
}
.btn-play:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(245,197,24,.6);}
.btn-play:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* ══════════ GAME BOARD ══════════ */
#screen-game{
  background:radial-gradient(ellipse at 50% 0%,#100090,#020060 50%,#000040);
  padding:0;justify-content:flex-start;
}
.game-header{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:.5rem 1rem;background:rgba(0,0,0,.35);border-bottom:2px solid rgba(245,197,24,.25);
  flex-shrink:0;gap:.5rem;flex-wrap:wrap;
}
.game-title{font-family:'Anton',sans-serif;font-size:1.2rem;letter-spacing:.12em;color:var(--gold);white-space:nowrap;}
.scoreboard{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;flex:1;}
.s-chip{
  display:flex;align-items:center;gap:.35rem;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:20px;padding:.2rem .7rem;font-size:.85rem;font-weight:700;
  letter-spacing:.04em;white-space:nowrap;transition:all .3s;
}
.s-dot{width:8px;height:8px;border-radius:50%;}

/* Board grid */
.board-wrap{
  flex:1;display:flex;flex-direction:column;
  width:100%;padding:.6rem .8rem .4rem;min-height:0;overflow:hidden;
}
.board{
  display:grid;grid-template-columns:repeat(6,1fr);
  gap:.35rem;flex:1;min-height:0;
}
.cat-header{
  background:linear-gradient(180deg,#1e18e0,#0a08b0);
  border:2px solid rgba(255,255,255,.18);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  text-align:center;padding:.4rem .3rem;
  font-family:'Anton',sans-serif;font-size:clamp(.65rem,1.2vw,.85rem);
  letter-spacing:.08em;color:var(--white);
  text-shadow:1px 1px 3px rgba(0,0,100,.8);
  line-height:1.2;
}
.tile{
  background:linear-gradient(160deg,#1810e8,#0a06c0);
  border:2px solid rgba(255,255,255,.15);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .18s;
  position:relative;overflow:hidden;
}
.tile::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.08),transparent);
  pointer-events:none;
}
.tile:hover:not(.used){
  background:linear-gradient(160deg,#2820f8,#1410d8);
  transform:scale(1.03);box-shadow:0 4px 20px rgba(245,197,24,.35);
  border-color:rgba(245,197,24,.5);
}
.tile.used{
  background:rgba(0,0,80,.4);border-color:rgba(255,255,255,.06);
  cursor:default;transform:none;box-shadow:none;
}
.tile-val{
  font-family:'Anton',sans-serif;
  font-size:clamp(1.1rem,2.5vw,2rem);
  color:var(--gold);
  text-shadow:2px 2px 4px rgba(0,0,80,.9);
}
.tile.used .tile-val{opacity:0;}

/* ══════════ MODAL ══════════ */
.modal-bg{
  display:none;position:fixed;inset:0;z-index:60;
  background:rgba(0,0,50,.88);
  align-items:center;justify-content:center;padding:1rem;
  animation:fadeIn .2s ease;
}
.modal-bg.active{display:flex;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

.modal{
  background:linear-gradient(160deg,#0e0cc0,#060480);
  border:3px solid var(--gold);border-radius:18px;
  padding:2rem;width:100%;max-width:680px;
  position:relative;box-shadow:0 0 60px rgba(245,197,24,.3),var(--shadow);
  animation:modalPop .35s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes modalPop{from{transform:scale(.85);opacity:0;}to{transform:scale(1);opacity:1;}}

.modal-cat{
  font-size:.75rem;letter-spacing:.25em;color:var(--gold);
  font-weight:700;margin-bottom:.5rem;text-transform:uppercase;
}
.modal-pts{
  font-family:'Anton',sans-serif;font-size:2.5rem;color:var(--gold);
  text-shadow:0 0 20px rgba(245,197,24,.5);margin-bottom:1.2rem;line-height:1;
}
.modal-q{
  font-size:clamp(1.1rem,2.5vw,1.45rem);font-weight:600;line-height:1.5;
  color:var(--white);margin-bottom:1.5rem;min-height:3rem;
}
.modal-answer-box{
  display:none;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);
  border-radius:12px;padding:1rem 1.3rem;margin-bottom:1.3rem;
}
.modal-answer-box.active{display:block;}
.answer-label{font-size:.7rem;letter-spacing:.2em;color:var(--muted);margin-bottom:.3rem;font-weight:700;}
.answer-text{font-size:1.1rem;font-weight:600;color:var(--gold);line-height:1.4;}

.modal-actions{display:flex;flex-direction:column;gap:.8rem;}
.reveal-btn{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:10px;
  padding:.75rem;color:var(--white);font-family:'Barlow',sans-serif;font-size:1rem;font-weight:700;
  letter-spacing:.06em;cursor:pointer;transition:all .2s;width:100%;
}
.reveal-btn:hover{background:rgba(255,255,255,.18);border-color:var(--gold);}

.award-section{display:none;gap:.5rem;flex-direction:column;}
.award-section.active{display:flex;}
.award-label{font-size:.75rem;letter-spacing:.15em;color:var(--muted);font-weight:700;text-align:center;}
.award-buttons{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center;}
.btn-award{
  padding:.55rem 1rem;border:2px solid;border-radius:10px;
  font-family:'Barlow',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:.04em;
  cursor:pointer;transition:all .18s;
}
.btn-award.correct{background:rgba(0,221,102,.12);border-color:var(--correct);color:var(--correct);}
.btn-award.correct:hover{background:rgba(0,221,102,.25);transform:translateY(-2px);}
.btn-award.wrong{background:rgba(255,34,68,.1);border-color:var(--wrong);color:var(--wrong);}
.btn-award.wrong:hover{background:rgba(255,34,68,.22);transform:translateY(-2px);}
.btn-noaward{
  width:100%;background:none;border:1px solid rgba(255,255,255,.12);border-radius:8px;
  padding:.5rem;color:var(--muted);font-family:'Barlow',sans-serif;font-size:.85rem;
  font-weight:600;letter-spacing:.05em;cursor:pointer;transition:all .2s;
}
.btn-noaward:hover{color:var(--white);border-color:rgba(255,255,255,.3);}

/* ══════════ FINAL ══════════ */
#screen-final{
  background:radial-gradient(ellipse at 50% 20%,#1a1000,#040080 50%,#000040);
  justify-content:center;padding:2rem;gap:1.4rem;
}
.final-title{
  font-family:'Anton',sans-serif;font-size:clamp(2.5rem,9vw,5rem);
  letter-spacing:.1em;color:var(--gold);
  text-shadow:0 0 40px rgba(245,197,24,.5);text-align:center;
}
.final-sub{font-size:.85rem;letter-spacing:.15em;color:var(--muted);text-align:center;margin-top:-.8rem;}
.podium{display:flex;flex-direction:column;gap:.6rem;width:100%;max-width:480px;}
.p-row{
  display:flex;align-items:center;gap:1rem;padding:1rem 1.3rem;
  border-radius:12px;border:1px solid;
  animation:slideIn .5s ease both;
}
@keyframes slideIn{from{transform:translateX(-40px);opacity:0;}to{transform:translateX(0);opacity:1;}}
.p-row.r1{background:rgba(245,197,24,.12);border-color:rgba(245,197,24,.4);}
.p-row.r2{background:rgba(200,200,200,.07);border-color:rgba(200,200,200,.22);}
.p-row.r3{background:rgba(200,120,50,.07);border-color:rgba(200,120,50,.22);}
.p-row.rx{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.07);}
.p-medal{font-size:1.7rem;width:2rem;text-align:center;}
.p-name{flex:1;font-family:'Anton',sans-serif;font-size:1.4rem;letter-spacing:.08em;}
.p-score{font-family:'Anton',sans-serif;font-size:1.9rem;letter-spacing:.04em;}
.p-pts{font-size:.75rem;letter-spacing:.1em;color:var(--muted);align-self:flex-end;margin-bottom:.2rem;}
.btn-restart{
  background:linear-gradient(135deg,#00aaff,#0077cc);border:none;border-radius:12px;
  padding:.9rem 2.5rem;color:#fff;font-family:'Anton',sans-serif;
  font-size:1.5rem;letter-spacing:.15em;cursor:pointer;transition:all .2s;
  box-shadow:0 4px 20px rgba(0,170,255,.35);
}
.btn-restart:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,170,255,.5);}

/* ── CONFETTI ── */
.cp{position:fixed;border-radius:2px;pointer-events:none;z-index:999;animation:fall var(--d) ease-in forwards;}
@keyframes fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}

/* ── FLASH ── */
.flash{display:none;position:fixed;inset:0;z-index:200;pointer-events:none;}
.flash.active{display:block;}
.flash.green{animation:flashG .5s ease-out forwards;}
.flash.red{animation:flashR .5s ease-out forwards;}
@keyframes flashG{0%{background:rgba(0,221,102,.22);}100%{background:transparent;}}
@keyframes flashR{0%{background:rgba(255,34,68,.22);}100%{background:transparent;}}
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<!-- ══════════ INTRO ══════════ -->
<div id="screen-intro" class="screen active">
  <div class="intro-logo">
    <div class="eyebrow">CITY OF PHARR · OFFICE OF STRATEGIC EXCELLENCE</div>
    <h1>PHARR<br>WAY</h1>
    <h2>SHOWDOWN</h2>
  </div>
  <div class="setup-box">
    <h3>👥 SET UP YOUR TEAMS</h3>
    <div class="teams-grid" id="teams-grid"></div>
    <button class="btn-addteam" id="btn-addteam" onclick="addTeam()">+ ADD TEAM (max 6)</button>
    <button class="btn-play" id="btn-play" onclick="startGame()">LET'S PLAY!</button>
  </div>
</div>

<!-- ══════════ GAME BOARD ══════════ -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <div class="game-title">PHARR WAY SHOWDOWN</div>
    <div class="scoreboard" id="scoreboard"></div>
  </div>
  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>
</div>

<!-- ══════════ QUESTION MODAL ══════════ -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-cat" id="modal-cat">CATEGORY</div>
    <div class="modal-pts" id="modal-pts">$200</div>
    <div class="modal-q" id="modal-q">Question text here.</div>
    <div class="modal-answer-box" id="modal-answer-box">
      <div class="answer-label">✅ ANSWER</div>
      <div class="answer-text" id="modal-answer-text">—</div>
    </div>
    <div class="modal-actions">
      <button class="reveal-btn" id="reveal-btn" onclick="revealAnswer()">👁 REVEAL ANSWER</button>
      <div class="award-section" id="award-section">
        <div class="award-label">AWARD POINTS TO…</div>
        <div class="award-buttons" id="award-buttons"></div>
        <button class="btn-noaward" onclick="closeModal(false)">No award — close question</button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════ FINAL ══════════ -->
<div id="screen-final" class="screen">
  <div class="final-title">🏆 FINAL SCORES 🏆</div>
  <div class="final-sub">PHARR WAY · SHOWDOWN</div>
  <div class="podium" id="podium"></div>
  <button class="btn-restart" onclick="restartGame()">PLAY AGAIN 🎮</button>
</div>

<script>
// ═══════════════════════════════════════════
// GAME DATA  —  6 categories × 5 questions
// ═══════════════════════════════════════════
const CATEGORIES = [
  {
    name: "LEADERSHIP",
    qs: [
      { q: "An _____ leader makes you feel encouraged.", a: "Inspirational" },
      { q: "An _____ leader is one that is expected to be responsible and justify their actions.", a: "Accountable" },
      { q: "A _____ leader cares more about the needs of others than their own.", a: "Selfless" },
      { q: "An _____ leader is able to adjust to new conditions.", a: "Adaptable" },
      { q: "A _____ leader is one that is known to be determined.", a: "Decisive" },
    ]
  },
  {
    name: "STRATEGY",
    qs: [
      { q: "What document guides the City of Pharr's goals and priorities?", a: "The Strategic Plan" },
      { q: "What department monitors performance, progress, and opportunities in the City of Pharr?", a: "Office of Strategic Excellence (OSE)"},
      { q: "What two things help keep the City on track with its strategy?", a: "Feedback and performance" },
      { q: "What do we call the plans used to improve department performance?", a: "Action Plans" },
      { q: "What kind of decisions does the City of Pharr make?", a: "Data-driven"},
    ]
  },
  {
    name: "CUSTOMERS",
    qs: [
      { q: "Who are the City of Pharr's Key Customers?", a: "Residents" },
      { q: "Name one way customers can reach Pharr employees.", a: "311, Email/Phone, City Website, City Boards/Council Meetings, Social Media" },
      { q: "What is the City of Pharr's Mission?", a: "To provide the highest level of municipal services every day." },
      { q: "What is the City of Pharr's daily commitment?", a: "Excellence Every Day" },
      { q: "How do you engage your customers and build strong relationships? ", a: "Service excellence and being a part of the community" },
    ]
  },
  {
    name: "ORGANIZATIONAL INTELLIGENCE",
    qs: [
      { q: "What scorecards are used by OSE to track and review performance?", a: "KPI Scorecards" },
      { q: "What do City of Pharr employees use to submit process improvements?", a: "STEP" },
      { q: "What is the goal of measuring and analyzing city performance data?", a: "Continuous improvement" },
      { q: "How often are departments expected to update their performance scorecards?", a: "Monthly" },
      { q: "What kind of opportunities are worth pursuing in the City of Pharr for better outcomes?", a: "Measurable and actionable opportunities" },
    ]
  },
  {
    name: "WORKFORCE",
    qs: [
      { q: "Name the City of Pharr program dedicated to developing and training staff through 3-4 day sessions.", a: "Pharr U" },
      { q: "Name the City of Pharr program aimed at developing leaders and leadership in the workforce.", a: "Leadership Cohort" },
      { q: "What drives the City of Pharr?", a: "Our mission, vision, and values" },
      { q: "How does the City listen to its employees?", a: "Through surveys, performance reviews, and informal forms of communication" },
      { q: "What does success look like in the the City of Pharr?", a: "YOU!" },
    ]
  },
  {
    name: "OPERATIONS",
    qs: [
      { q: "What departments contribute to the infrastructure in the City of Pharr?", a: "Public Works, Public Utilities, Bridge, IT, Maintenance, Development Services, Engineering" },
      { q: "Name departments that improve the quality of life for residents in Pharr.", a: "Parks and Rec, Food Service, Golf, Library, Special Events" },
      { q: "What departments provide administrative support in the City of Pharr?", a: "OCM, OSE, OCC, Grants, Purchasing, HR, City Clerk, Finance" },
      { q: "What departments are responsible for providing a Safe and Secure community?", a: "Fire, EMS, Police, Public Safety Comms., Building and Code, Public Health, Court" },
      { q: "Does the City of Pharr only provide public service when residents ask?", a: "No. Pharr delivers essential services every day." },
    ]
  }
];

const POINT_VALUES = [200, 400, 600, 800, 1000];
const TEAM_COLORS = ['#f3c300','#00679f','#9bc13c','#81d2e8','#fdfbe3','#9d9fa2'];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let teams = [];
let usedTiles = new Set(); // "cat-q"
let currentTile = null;   // {catIdx, qIdx}
let audioCtx = null;

// ═══════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, dur, vol=0.3) {
  try {
    const ctx = getAudio();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(ctx.currentTime); o.stop(ctx.currentTime + dur);
  } catch(e){}
}
function soundReveal()  { playTone(880,'sine',.12); setTimeout(()=>playTone(1100,'sine',.15),100); }
function soundCorrect() { [523,659,784].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',.18,0.25),i*80)); }
function soundWrong()   { playTone(180,'sawtooth',.35,0.2); }
function soundSelect()  { playTone(660,'sine',.1,0.2); }
function soundBuzz()    {
  // Classic Jeopardy-ish buzz: three descending tones
  [440,330,220].forEach((f,i)=>setTimeout(()=>playTone(f,'square',.1,0.15),i*60));
}

// ═══════════════════════════════════════════
// SETUP
// ═══════════════════════════════════════════
function initSetup() {
  teams = [];
  addTeam('Team 1'); addTeam('Team 2');
}
function addTeam(name) {
  if (teams.length >= 6) return;
  teams.push({ name: name || `Team ${teams.length+1}`, score: 0 });
  renderSetupTeams();
  document.getElementById('btn-addteam').disabled = teams.length >= 6;
}
function removeTeam(i) {
  if (teams.length <= 2) return;
  teams.splice(i,1); renderSetupTeams();
  document.getElementById('btn-addteam').disabled = false;
}
function renderSetupTeams() {
  const g = document.getElementById('teams-grid');
  g.innerHTML = '';
  teams.forEach((t,i) => {
    const row = document.createElement('div'); row.className = 'team-row';
    const dot = document.createElement('div'); dot.className = 't-dot';
    dot.style.background = TEAM_COLORS[i];
    const inp = document.createElement('input'); inp.className = 't-input';
    inp.type='text'; inp.value=t.name; inp.placeholder=`Team ${i+1}`;
    inp.oninput = () => { teams[i].name = inp.value || `Team ${i+1}`; };
    const rm = document.createElement('button'); rm.className = 't-remove';
    rm.textContent = '✕'; rm.title = 'Remove';
    rm.disabled = teams.length <= 2;
    rm.onclick = () => removeTeam(i);
    row.append(dot,inp,rm); g.appendChild(row);
  });
  document.getElementById('btn-play').disabled = teams.length < 2;
}

function startGame() {
  document.querySelectorAll('.t-input').forEach((inp,i)=>{ if(teams[i]) teams[i].name = inp.value||`Team ${i+1}`; });
  teams.forEach(t=>t.score=0);
  usedTiles = new Set();
  showScreen('screen-game');
  buildBoard();
  updateScoreboard();
}

// ═══════════════════════════════════════════
// BOARD
// ═══════════════════════════════════════════
function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  // Headers
  CATEGORIES.forEach(cat => {
    const h = document.createElement('div'); h.className = 'cat-header';
    h.textContent = cat.name; board.appendChild(h);
  });
  // Tiles
  POINT_VALUES.forEach((pts, qi) => {
    CATEGORIES.forEach((cat, ci) => {
      const key = `${ci}-${qi}`;
      const tile = document.createElement('div');
      tile.className = 'tile' + (usedTiles.has(key) ? ' used' : '');
      tile.dataset.key = key;
      const val = document.createElement('div'); val.className = 'tile-val';
      val.textContent = `$${pts}`; tile.appendChild(val);
      tile.onclick = () => openTile(ci, qi);
      board.appendChild(tile);
    });
  });
}

function updateScoreboard() {
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = '';
  teams.forEach((t,i) => {
    const chip = document.createElement('div'); chip.className = 's-chip';
    const scoreColor = t.score < 0 ? '#ff4466' : TEAM_COLORS[i];
    chip.innerHTML = `<div class="s-dot" style="background:${TEAM_COLORS[i]}"></div>
      <span>${t.name}</span>
      <strong style="color:${scoreColor}">$${t.score}</strong>`;
    sb.appendChild(chip);
  });
}

// ═══════════════════════════════════════════
// TILE / MODAL
// ═══════════════════════════════════════════
function openTile(ci, qi) {
  const key = `${ci}-${qi}`;
  if (usedTiles.has(key)) return;
  currentTile = { ci, qi, key };
  soundSelect();

  const cat = CATEGORIES[ci];
  const q = cat.qs[qi];
  const pts = POINT_VALUES[qi];

  document.getElementById('modal-cat').textContent = cat.name;
  document.getElementById('modal-pts').textContent = `$${pts}`;
  document.getElementById('modal-q').textContent = q.q;
  document.getElementById('modal-answer-text').textContent = q.a;
  document.getElementById('modal-answer-box').classList.remove('active');
  document.getElementById('reveal-btn').style.display = '';
  document.getElementById('award-section').classList.remove('active');
  document.getElementById('award-section').style.display = '';

  // Build award buttons
  buildAwardButtons(pts);

  document.getElementById('modal-bg').classList.add('active');
  soundBuzz();
}

function buildAwardButtons(pts) {
  const container = document.getElementById('award-buttons');
  container.innerHTML = '';
  teams.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn-award correct';
    btn.style.borderColor = TEAM_COLORS[i];
    btn.style.color = TEAM_COLORS[i];
    btn.style.background = hexAlpha(TEAM_COLORS[i], 0.1);
    btn.textContent = `✅ ${t.name} +$${pts}`;
    btn.onclick = () => awardPoints(i, pts);
    container.appendChild(btn);
  });
  // Deduct buttons
  teams.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn-award wrong';
    btn.textContent = `❌ ${t.name} -$${pts}`;
    btn.onclick = () => awardPoints(i, -pts);
    container.appendChild(btn);
  });
}

function revealAnswer() {
  soundReveal();
  document.getElementById('modal-answer-box').classList.add('active');
  document.getElementById('reveal-btn').style.display = 'none';
  document.getElementById('award-section').classList.add('active');
}

function awardPoints(teamIdx, pts) {
  teams[teamIdx].score += pts;
  if (pts > 0) { soundCorrect(); doFlash('green'); }
  else { soundWrong(); doFlash('red'); }
  closeModal(true);
}

function closeModal(markUsed) {
  if (markUsed && currentTile) {
    usedTiles.add(currentTile.key);
    const tile = document.querySelector(`.tile[data-key="${currentTile.key}"]`);
    if (tile) tile.classList.add('used');
  }
  document.getElementById('modal-bg').classList.remove('active');
  updateScoreboard();
  currentTile = null;

  // Check if all tiles used
  if (usedTiles.size >= CATEGORIES.length * POINT_VALUES.length) {
    setTimeout(showFinal, 600);
  }
}

function doFlash(color) {
  const el = document.getElementById('flash');
  el.className = 'flash';
  void el.offsetWidth;
  el.classList.add('active', color);
  setTimeout(() => el.classList.remove('active','green','red'), 500);
}

// ═══════════════════════════════════════════
// FINAL
// ═══════════════════════════════════════════
function showFinal() {
  showScreen('screen-final');
  const sorted = [...teams].map((t,i)=>({...t,ci:i})).sort((a,b)=>b.score-a.score);
  const medals = ['🥇','🥈','🥉'];
  const pod = document.getElementById('podium');
  pod.innerHTML = '';
  sorted.forEach((t, rank) => {
    const row = document.createElement('div');
    row.className = `p-row r${rank<3?rank+1:'x'}`;
    row.style.animationDelay = `${rank*0.12}s`;
    const scoreColor = t.score < 0 ? '#ff4466' : TEAM_COLORS[t.ci];
    row.innerHTML = `
      <div class="p-medal">${medals[rank]||rank+1+'.'}</div>
      <div class="p-name" style="color:${TEAM_COLORS[t.ci]}">${t.name.toUpperCase()}</div>
      <div class="p-score" style="color:${scoreColor}">$${t.score}</div>
      <div class="p-pts">PTS</div>`;
    pod.appendChild(row);
  });
  fireConfetti();
}

function restartGame() {
  document.querySelectorAll('.cp').forEach(e=>e.remove());
  showScreen('screen-intro'); initSetup();
}

// ═══════════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════════
function fireConfetti() {
  const colors=['#f5c518','#00aaff','#ff5566','#44ff88','#cc77ff','#ff9900','#ffffff'];
  for(let i=0;i<100;i++) setTimeout(()=>{
    const el=document.createElement('div'); el.className='cp';
    el.style.left=Math.random()*100+'vw'; el.style.top='-15px';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.width=(5+Math.random()*9)+'px'; el.style.height=(5+Math.random()*9)+'px';
    el.style.setProperty('--d',(1.5+Math.random()*2.2)+'s');
    el.style.borderRadius=Math.random()>.5?'50%':'2px';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4000);
  },i*35);
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function hexAlpha(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
initSetup();
</script>
</body>
</html>
